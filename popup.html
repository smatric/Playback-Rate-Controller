<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Playback Rate Controller's Popup</title>
    <style>
        :root {
            --accent: #264c9e;
        }
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: 200px;
            margin: 0;
            padding: 20px 16px 16px;
            background: #fff;
            overflow: hidden;
        }
        .hidden {
            display: none;
        }

        /* No content state */
        .prc-short-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 16px 0;
            color: color-mix(in srgb, var(--accent) 55%, white);
            font-size: 12px;
            text-align: center;
        }
        .icon {
            display: inline-block;
            width: 1em;
            height: 1em;
            fill: currentColor;
        }
        .icon-wondering {
            font-size: 52px;
            color: color-mix(in srgb, var(--accent) 30%, white);
        }

        /* Rate display */
        .prc-top-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .prc-top-controls-rate {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .prc-control-rate {
            font-size: 34px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            width: 80px;
            text-align: center;
        }
        .prc-control-rate-label {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: color-mix(in srgb, var(--accent) 55%, white);
            margin-top: 4px;
        }

        /* +/- buttons */
        .prc-control-btn {
            cursor: pointer;
            border: none;
        }
        .prc-control-btn:focus {
            outline: none;
        }
        .prc-control-faster-slower-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 24px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
            box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 35%, transparent);
        }
        .prc-control-faster-slower-btn:hover {
            background: color-mix(in srgb, var(--accent), black 20%);
        }
        .prc-control-faster-slower-btn:active {
            transform: scale(0.92);
        }
        .prc-control-faster-slower-btn:focus {
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 30%, transparent);
        }
        .prc-control-faster-slower-btn > span {
            position: relative;
            top: -1px;
        }

        /* Preset rate buttons */
        .prc-extra-controls {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 7px;
            margin-bottom: 14px;
        }
        .prc-control-rate-btn {
            border-radius: 20px;
            border: 1.5px solid color-mix(in srgb, var(--accent) 35%, white);
            background: color-mix(in srgb, var(--accent) 12%, white);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            padding: 10px;
            width: 100%;
            transition: border-color 0.15s, background 0.15s;
            white-space: nowrap;
        }
        .prc-control-rate-btn:hover {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 22%, white);
        }
        .prc-control-rate-btn:focus {
            outline: none;
        }
        .prc-control-rate-btn--center {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* Slider */
        .prc-controls-slider input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: color-mix(in srgb, var(--accent) 18%, white);
            outline: none;
            cursor: pointer;
        }
        .prc-controls-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 1px 4px color-mix(in srgb, var(--accent) 40%, transparent);
            transition: transform 0.1s;
        }
        .prc-controls-slider input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }
    </style>

    <script src="popup.js"></script>
</head>
<body>
    <div id="prc-popup-no-content">
        <div class="prc-short-message">
            <svg style="position: absolute; width: 0; height: 0;" width="0" height="0" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                <defs>
                    <symbol id="icon-wondering" viewBox="0 0 1024 1024">
                        <title>wondering</title>
                        <path class="path1" d="M512 1024c282.77 0 512-229.23 512-512s-229.23-512-512-512-512 229.23-512 512 229.23 512 512 512zM512 96c229.75 0 416 186.25 416 416s-186.25 416-416 416-416-186.25-416-416 186.25-416 416-416zM745.74 601.62l22.488 76.776-437.008 128.002-22.488-76.776zM256 320c0-35.346 28.654-64 64-64s64 28.654 64 64c0 35.346-28.654 64-64 64s-64-28.654-64-64zM640 320c0-35.346 28.654-64 64-64s64 28.654 64 64c0 35.346-28.654 64-64 64s-64-28.654-64-64z"></path>
                    </symbol>
                </defs>
            </svg>
            <svg class="icon icon-wondering"><use xlink:href="#icon-wondering"></use></svg>
            <div>No audio/video content found on this page.</div>
        </div>
    </div>

    <div id="prc-popup-content" class="hidden">
        <div class="prc-top-controls">
            <button id="prc-slower" class="prc-control-btn prc-control-faster-slower-btn"><span>−</span></button>
            <div class="prc-top-controls-rate">
                <span id="prc-rate" class="prc-control-rate"></span>
                <span class="prc-control-rate-label">Playback Rate</span>
            </div>
            <button id="prc-faster" class="prc-control-btn prc-control-faster-slower-btn" autofocus><span>+</span></button>
        </div>

        <div class="prc-extra-controls" id="prc-extra-controls"></div>

        <div class="prc-controls-slider">
            <input id="prc-rate-slider" type="range" min="0.1" max="6" value="1" step=".1">
        </div>
    </div>
</body>
</html>
